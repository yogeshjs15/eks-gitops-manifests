apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml
- service-account.yaml
- deployment.yaml
- service.yaml

commonLabels:
  app: sample-app
  managed-by: argocd
  environment: dev

commonAnnotations:
  version: ${IMAGE_TAG}
  updated-at: ${TIMESTAMP}

configMapGenerator:
- name: app-config
  literals:
  - LOG_LEVEL=info
  - MAX_CONNECTIONS=100
  - TIMEOUT=30s

images:
- name: ${ECR_REPOSITORY_URL}
  newName: ${ECR_REPOSITORY_URL}
  newTag: ${IMAGE_TAG}
